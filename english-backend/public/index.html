<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập – English Curriculum</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --border:#2a3140; --border2:#374151;
    --text:#e6edf3; --text2:#8b949e; --text3:#4d5566;
    --gold:#c8a45a; --teal:#3fb6b6; --red:#f85149; --green:#3fb950;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
  .login-wrap{width:100%;max-width:400px;padding:20px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
  .brand{text-align:center;margin-bottom:32px;}
  .brand-mark{font-family:'Lora',serif;font-size:22px;font-weight:700;color:var(--gold);}
  .brand-sub{font-size:11px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;}
  .form-title{font-family:'Lora',serif;font-size:20px;font-weight:700;margin-bottom:6px;}
  .form-desc{font-size:12px;color:var(--text2);margin-bottom:24px;}
  .form-group{margin-bottom:16px;}
  .form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:7px;}
  .form-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:11px 14px;transition:border-color .15s;outline:none;}
  .form-input:focus{border-color:var(--teal);}
  .btn-login{width:100%;padding:12px;background:var(--gold);color:#111;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;margin-top:6px;}
  .btn-login:hover{background:#d4af6a;}
  .btn-login:disabled{opacity:0.6;cursor:not-allowed;}
  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:11px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .demo-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
  .demo-box p{font-size:11px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
  .demo-btn{display:block;width:100%;text-align:left;padding:8px 12px;margin-bottom:6px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
  .demo-btn:last-child{margin-bottom:0;}
  .demo-btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface);}
  .demo-btn strong{color:var(--gold);}
  .error-msg{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">🎓 EnglishPath</div>
      <div class="brand-sub">Curriculum Manager</div>
    </div>

    <h2 class="form-title">Đăng nhập</h2>
    <p class="form-desc">Chào mừng trở lại! Nhập thông tin để tiếp tục.</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Đăng nhập</button>

    <div class="divider">Tài khoản demo</div>
    <div class="demo-box">
      <p>Chọn nhanh để điền tự động:</p>
      <button class="demo-btn" onclick="fillDemo('teacher@example.com','teacher123')">
        👩‍🏫 <strong>Giáo viên</strong> — teacher@example.com
      </button>
      <button class="demo-btn" onclick="fillDemo('student_a@example.com','student123')">
        👨‍🎓 <strong>Học viên A</strong> — student_a@example.com
      </button>
      <button class="demo-btn" onclick="fillDemo('student_b@example.com','student123')">
        👨‍🎓 <strong>Học viên B</strong> — student_b@example.com
      </button>
      <button class="demo-btn" onclick="fillDemo('student_c@example.com','student123')">
        👨‍🎓 <strong>Học viên C</strong> — student_c@example.com
      </button>
    </div>
  </div>
</div>

<script>
  const BASE_URL = "http://localhost:3000";

  // Redirect if already logged in
  if (localStorage.getItem("token")) window.location.href = "dashboard.html";

  function fillDemo(email, pw) {
    document.getElementById("email").value = email;
    document.getElementById("password").value = pw;
    document.getElementById("email").focus();
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }
  function hideError() { document.getElementById("error-msg").style.display = "none"; }

  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  async function doLogin() {
    hideError();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("btn-login");

    if (!email || !password) { showError("Vui lòng nhập email và mật khẩu."); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Đang đăng nhập...';

    try {
      const res = await fetch(`${BASE_URL}/api/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Đăng nhập thất bại");

      localStorage.setItem("token", data.token);
      localStorage.setItem("user",  JSON.stringify(data.user));
      window.location.href = "dashboard.html";
    } catch (e) {
      showError(e.message);
      btn.disabled = false;
      btn.innerHTML = "Đăng nhập";
    }
  }
</script>
</body>
</html>
